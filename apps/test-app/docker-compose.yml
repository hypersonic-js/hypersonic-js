services:
  postgres:
    image: postgres:18-alpine
    container_name: hypersonic_test_db
    environment:
      POSTGRES_USER: hypersonic
      POSTGRES_PASSWORD: hypersonic
      POSTGRES_DB: hypersonic_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypersonic -d hypersonic_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - hypersonic_test_pgdata_pg18:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    container_name: hypersonic_test_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hypersonic_test_pgdata_pg18: